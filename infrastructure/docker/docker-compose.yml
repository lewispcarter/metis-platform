# DOCKER COMPOSE
# Purpose: Provides local PostgreSQL and Redis dependencies for the platform.
# Role: Enables reproducible local development infrastructure.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: metis
      POSTGRES_PASSWORD: metis
      POSTGRES_DB: metis_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
